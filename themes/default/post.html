{{define "postHTML"}}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{.Post.Description}}">
    <title>{{.Post.Title}} — {{.Config.Author}}</title>
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../assets/style.css">

    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{.Post.Title}}">
    <meta property="og:description" content="{{.Post.Description}}">
    <meta property="og:site_name" content="{{.Config.Author}}">
    <meta property="article:author" content="{{.Post.Author}}">
    <meta property="article:published_time" content="{{.Post.Date}}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{.Post.Title}}">
    <meta name="twitter:description" content="{{.Post.Description}}">

    <!-- Canonical -->
    <link rel="canonical" href="https://briancurtis.de/posts/{{.Post.Link}}">

    <style>.social-icons { display: none; }</style>
</head>

{{ template "body" .Config }}

<article>
    <header>
        <div class="container">
            <h1>{{.Post.Title}}</h1>
            {{if hasCover .Post}}
            <img class="cover-img" src="{{.Post.CoverImg}}" alt="{{.Post.Title}}" />
            {{end}}
            <p class="post-meta article-meta">
                <img class="author-img" src="{{.Post.AuthorImg}}" alt="{{.Post.Author}}" />
                <span>{{.Post.Author}} · {{.Post.Date}}</span>
            </p>
        </div>
    </header>
    <section>
        <div class="container">{{.Post.Content}}</div>
    </section>
</article>
<footer class="container">
    &copy; {{now.UTC.Year}} {{.Config.Author}}. All rights reserved.
</footer>

{{ template "footer" .Config }}

{{end}}
